<!doctype html><!-- build: billing+schedule -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Penn Mobile Wash — Operations Dashboard</title>
<style>
  :root{
    --bg:#f5f7fa; --soft:#eef2f7; --soft-2:#e6ecf4;
    --ink:#172033; --ink-2:#2f3a4d; --muted:#667085; --faint:#98a2b3;
    --line:#e3e8ef; --line-2:#eef1f6;
    --accent:#2563eb; --accent-soft:#eaf2ff; --accent-ink:#1d4ed8;
    --navy:#142b44;
    --red:#b42318; --red-soft:#fdeceb;
    --amber:#b45309; --amber-soft:#fbf1e2;
    --green:#15803d; --green-soft:#e7f5ec;
    --blue:#2563eb;
    --shadow-sm:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.05);
    --r:12px;
    --sb:236px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:"Inter",ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px}
  .mono{font-variant-numeric:tabular-nums}
  a{color:var(--accent);text-decoration:none}

  .app{display:flex;min-height:100vh}
  /* sidebar */
  .sidebar{width:var(--sb);flex:0 0 var(--sb);position:fixed;inset:0 auto 0 0;height:100vh;
    background:var(--bg);border-right:1px solid var(--line);padding:20px 14px;display:flex;flex-direction:column;gap:2px;z-index:40}
  .brand{display:flex;align-items:center;gap:10px;padding:4px 10px 16px}
  .brand .mark{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    background:var(--accent);color:#fff;font-weight:700;font-size:12.5px;letter-spacing:-.3px}
  .brand b{font-size:14px;font-weight:680;letter-spacing:-.2px;display:block;line-height:1.2}
  .brand span{font-size:11px;color:var(--faint);font-weight:500}
  .nav{display:flex;flex-direction:column;gap:1px;margin-top:6px}
  .nav button{display:flex;align-items:center;gap:11px;padding:8px 11px;border-radius:8px;color:var(--ink-2);
    font-size:14px;font-weight:550;text-align:left;transition:background .12s,color .12s}
  .nav button .ic{width:17px;height:17px;flex:0 0 auto;color:var(--faint)}
  .nav button:hover{background:var(--soft)}
  .nav button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:650}
  .nav button.on .ic{color:var(--accent)}
  .sb-foot{margin-top:auto;display:flex;flex-direction:column;gap:1px}
  .sb-foot button{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:8px;color:var(--muted);font-size:13px;font-weight:550;text-align:left}
  .sb-foot button:hover{background:var(--soft);color:var(--ink-2)}
  .sb-foot .ic{width:15px;height:15px;color:var(--faint)}

  .main{flex:1;margin-left:var(--sb);min-width:0;padding-bottom:96px}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);padding:16px 34px}
  .topbar .row{display:flex;align-items:center;gap:16px;max-width:1120px;margin:0 auto}
  .topbar h1{font-size:19px;margin:0;font-weight:680;letter-spacing:-.4px}
  .topbar .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
  .search{margin-left:auto;position:relative;display:flex;align-items:center}
  .search input{width:210px;padding:8px 11px 8px 32px;border-radius:9px;border:1px solid var(--line);
    background:var(--soft);color:var(--ink);transition:width .16s,border-color .14s,background .14s}
  .search input:focus{outline:none;border-color:var(--accent);background:#fff;width:240px}
  .search .si{position:absolute;left:10px;width:15px;height:15px;color:var(--faint);pointer-events:none}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:9px;font-size:13px;font-weight:600;
    background:#fff;border:1px solid var(--line);color:var(--ink-2);transition:background .12s,border-color .12s,transform .05s}
  .btn:hover{background:var(--soft);border-color:#e0e2e6}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
  .btn.primary:hover{background:var(--accent-ink)}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn.ghost{background:none;border-color:transparent}
  .btn.ghost:hover{background:var(--soft)}
  .btn.danger{color:var(--red);border-color:transparent;background:none}
  .btn.danger:hover{background:var(--red-soft)}

  .content{max-width:1120px;margin:0 auto;padding:28px 34px 0}
  .hidden{display:none!important}

  /* stat strip (not boxy) */
  .strip{display:flex;align-items:stretch;gap:0;margin-bottom:34px;flex-wrap:wrap}
  .stat{padding:2px 26px 2px 0;margin-right:26px;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .n{font-size:26px;font-weight:720;letter-spacing:-1px;line-height:1}
  .stat .l{font-size:12px;color:var(--muted);margin-top:6px;font-weight:550;display:flex;align-items:center;gap:6px}
  .stat .l .pip{width:7px;height:7px;border-radius:50%}

  .sec{margin-bottom:38px}
  .sec-h{display:flex;align-items:baseline;gap:10px;margin:0 0 6px}
  .sec-h h2{font-size:13px;font-weight:680;letter-spacing:.2px;color:var(--ink);margin:0}
  .sec-h .count{font-size:12px;color:var(--faint);font-weight:600}
  .sec-h .grow{flex:1}
  .sec-h .link{font-size:12.5px;color:var(--muted);font-weight:600}
  .sec-h .link:hover{color:var(--accent)}

  /* clean list rows (replaces cards) */
  .list{margin-top:8px}
  .row{display:flex;align-items:center;gap:14px;padding:13px 8px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:background .1s;border-radius:8px}
  .row:hover{background:var(--soft)}
  .row:last-child{border-bottom:none}
  .av{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-size:11.5px;font-weight:700;color:var(--navy);background:var(--soft-2);letter-spacing:-.2px}
  .row .nm{font-weight:620;font-size:14.5px;letter-spacing:-.1px}
  .row .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
  .row .grow{flex:1;min-width:0}
  .row .col{font-size:13px;color:var(--ink-2);text-align:left;white-space:nowrap}
  .row .col .ch{font-size:11px;color:var(--faint);display:block;margin-bottom:2px;font-weight:600;letter-spacing:.2px;text-transform:uppercase}

  /* accounts table */
  .thead{display:flex;align-items:center;gap:14px;padding:0 8px 9px;border-bottom:1px solid var(--line);
    font-size:11px;color:var(--faint);font-weight:680;letter-spacing:.4px;text-transform:uppercase}
  .c-acct{flex:1;min-width:0}
  .c-sched{width:120px;flex:0 0 120px}
  .c-units{width:150px;flex:0 0 150px}
  .c-crew{width:140px;flex:0 0 140px}
  .c-due{width:120px;flex:0 0 120px}
  .c-stat{width:110px;flex:0 0 110px;text-align:right;display:flex;justify-content:flex-end}

  .status{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;white-space:nowrap}
  .status .d{width:7px;height:7px;border-radius:50%}
  .s-over{color:var(--red)} .s-due{color:var(--amber)} .s-soon{color:var(--blue)} .s-ok{color:var(--green)}

  .pill{font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--soft-2);padding:2px 8px;border-radius:6px}
  .crewline{display:flex;align-items:center}
  .crewline .ca{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:10px;font-weight:680;margin-left:-6px;border:2px solid #fff}
  .crewline .ca:first-child{margin-left:0}

  /* mini progress */
  .barwrap{display:flex;align-items:center;gap:8px}
  .bar{height:5px;width:64px;border-radius:4px;background:var(--soft-2);overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:4px}
  .barwrap .pc{font-size:11.5px;color:var(--muted);font-weight:600;min-width:30px}

  /* timeline */
  .tl{margin-top:8px}
  .tl-item{display:flex;gap:13px;padding:9px 0}
  .tl-item .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:7px;flex:0 0 auto}
  .tl-item .b .t{font-size:13.5px;font-weight:560}
  .tl-item .b .m{font-size:12px;color:var(--muted);margin-top:1px}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:600;padding:2px 0;margin-bottom:18px}
  .back:hover{color:var(--ink)}
  .dh{display:flex;align-items:flex-start;gap:15px;padding-bottom:22px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .dh .av{width:46px;height:46px;border-radius:11px;font-size:16px}
  .dh h2{margin:0;font-size:22px;font-weight:700;letter-spacing:-.5px}
  .dh .loc{color:var(--muted);font-size:13px;margin-top:3px}
  .dh .acts{margin-left:auto;display:flex;gap:8px}
  .dcols{display:grid;grid-template-columns:1fr 300px;gap:38px;align-items:start}
  .block{margin-bottom:30px}
  .block > h3{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint);margin:0 0 14px}

  .facts{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px}
  .fact .l{font-size:12px;color:var(--muted);font-weight:550}
  .fact .v{font-size:15px;font-weight:640;margin-top:3px;letter-spacing:-.2px}
  .info{display:flex;flex-direction:column;gap:0}
  .info .ir{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-2);font-size:13.5px;align-items:flex-start}
  .info .ir:last-child{border-bottom:none}
  .info .ir .l{width:62px;flex:0 0 62px;color:var(--muted);font-size:12.5px}
  .info .ir .v{font-weight:560;word-break:break-word}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip2{display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 5px;border-radius:999px;background:var(--soft);font-size:12.5px;font-weight:560}
  .chip2 .ca{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9.5px;font-weight:700}

  /* wash board */
  .wb-h{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px}
  .wb-h .tabs{display:inline-flex;gap:18px}
  .wb-h .tabs button{font-size:13.5px;font-weight:600;color:var(--muted);padding:2px 0 8px;border-bottom:2px solid transparent;margin-bottom:-1px}
  .wb-h .tabs button.on{color:var(--ink);border-color:var(--accent)}
  .wb-h .grow{flex:1}
  .wb-meta{font-size:12.5px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .wb-meta b{color:var(--ink)}
  .ug{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px}
  .u{position:relative;border:1px solid var(--line);border-radius:9px;padding:10px 6px 9px;text-align:center;background:#fff;transition:border-color .12s,background .12s,transform .05s}
  .u:active{transform:scale(.95)}
  .u:hover{border-color:#dcdee2}
  .u .un{font-size:13.5px;font-weight:640;letter-spacing:.2px}
  .u .us{font-size:9.5px;color:var(--faint);margin-top:2px;min-height:11px;font-weight:600}
  .u.done{background:var(--accent-soft);border-color:#bfe0db}
  .u.done .un{color:var(--accent-ink)}
  .u.flag{border-color:#e9c08f;background:var(--amber-soft)}
  .u.flag .un{color:var(--amber)}
  .u .fb{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--faint);opacity:0;transition:opacity .12s}
  .u:hover .fb,.u.flag .fb{opacity:1}
  .u .fb:hover{background:#fff;color:var(--amber)}
  .u.flag .fb{color:var(--amber)}
  .u .ck{position:absolute;top:5px;left:6px;width:13px;height:13px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center}
  .u.done .ck{display:flex}
  .u .ck svg{width:8px;height:8px}

  .issues{margin-top:16px;border-top:1px solid var(--line-2);padding-top:14px}
  .issue{display:flex;gap:10px;align-items:flex-start;padding:7px 0;font-size:13px}
  .issue .ib{width:6px;height:6px;border-radius:50%;background:var(--amber);margin-top:7px;flex:0 0 auto}
  .issue .it b{font-weight:640}
  .issue .ix{margin-left:auto;color:var(--faint);font-size:12px;font-weight:600}
  .issue .ix:hover{color:var(--red)}

  .empty{color:var(--muted);font-size:13.5px;padding:22px 4px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(20,22,28,.42);backdrop-filter:blur(2px);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.22);width:100%;max-width:470px;max-height:90vh;overflow:auto}
  .modal .mh{padding:18px 22px 4px}
  .modal .mh h3{margin:0;font-size:17px;font-weight:680}
  .modal .mb{padding:14px 22px;display:flex;flex-direction:column;gap:14px}
  .modal .mf{padding:14px 22px 18px;display:flex;gap:10px;justify-content:flex-end}
  label.fld{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--muted);font-weight:600}
  .fld input,.fld select{background:#fff;border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:10px 11px;width:100%}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pick{display:flex;flex-wrap:wrap;gap:7px}
  .pick button{padding:7px 11px;border-radius:8px;border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-2);background:#fff}
  .pick button.on{background:var(--accent);color:#fff;border-color:transparent}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;
    padding:11px 17px;border-radius:11px;font-size:13.5px;font-weight:560;opacity:0;transition:all .24s;z-index:80;pointer-events:none;max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,.2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .tabbar{display:none}
  @media (max-width:920px){ .dcols{grid-template-columns:1fr;gap:0} .c-crew{display:none} }
  @media (max-width:720px){
    :root{--sb:0px}
    .sidebar{display:none}
    .main{padding-bottom:90px}
    .topbar{padding:14px 18px}
    .content{padding:22px 18px 0}
    .c-units,.c-due{display:none}
    .c-sched{flex-basis:96px;width:96px}
    .strip{gap:0}
    .stat{padding-right:18px;margin-right:18px}
    .stat .n{font-size:21px}
    .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);
      border-top:1px solid var(--line);justify-content:space-around;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
    .tabbar button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:10.5px;font-weight:650;padding:4px 14px}
    .tabbar button.on{color:var(--accent)}
    .tabbar .ic{width:20px;height:20px}
    .dh .acts{margin-left:0;width:100%;margin-top:12px}
  }
  @media (max-width:430px){ .ug{grid-template-columns:repeat(auto-fill,minmax(70px,1fr))} .facts{grid-template-columns:1fr 1fr} }
.weekstrip{display:flex;gap:8px;margin-bottom:30px;overflow-x:auto;padding-bottom:4px}
.day{flex:1;min-width:62px;border:1px solid var(--line);border-radius:11px;padding:10px 6px;text-align:center;background:#fff}
.day.has{border-color:#cfe0dd;background:var(--accent-soft)}
.day.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.day .dw{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.day .dn{font-size:18px;font-weight:720;margin-top:3px;letter-spacing:-.5px}
.day .dc{font-size:11px;color:var(--accent-ink);font-weight:700;min-height:14px;margin-top:2px}
.agday{margin-bottom:24px}
.agh{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.agdate{font-size:14.5px;font-weight:680;letter-spacing:-.2px}
.agcount{font-size:12px;color:var(--faint);font-weight:600}
.report{max-width:520px}
.rprint{padding:24px}
.rhd{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--line)}
.rbrand{display:flex;align-items:center;gap:10px}
.mark2{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.rbrand b{font-size:14px}
.rmuted{color:var(--muted);font-size:12px}
.rdate{font-size:12.5px;color:var(--muted)}
.rtitle{padding:16px 0 4px}
.rtitle h2{margin:0;font-size:20px;font-weight:720;letter-spacing:-.4px}
.rrow{display:flex;gap:34px;padding:14px 0;border-bottom:1px solid var(--line-2)}
.rk{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700}
.rv{font-size:15px;font-weight:640;margin-top:3px}
.rlist{padding:16px 0 4px}
.rchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.rchip{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:3px 8px}
.rissues{padding:14px 0 0;font-size:13px;color:var(--amber)}
.rissues b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
#printHolder{display:none}
@media print{
  body{background:#fff}
  body *{visibility:hidden}
  #printHolder,#printHolder *{visibility:visible}
  #printHolder{display:block;position:absolute;left:0;top:0;width:100%}
  #printHolder .rprint{padding:10px 6px}
}
.calbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.calttl{font-size:18px;font-weight:720;letter-spacing:-.3px}
.calnav{display:flex;gap:6px}
.cal{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
.calhead{display:grid;grid-template-columns:repeat(7,1fr);background:var(--soft);border-bottom:1px solid var(--line)}
.calhead>div{padding:9px 10px;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{min-height:106px;border-right:1px solid var(--line-2);border-bottom:1px solid var(--line-2);padding:7px;display:flex;flex-direction:column;gap:4px}
.cell:nth-child(7n){border-right:none}
.cell.out{background:#fcfcfd}
.cell.out .cn{color:var(--faint)}
.cell.today .cn{background:var(--accent);color:#fff}
.cn{font-size:12.5px;font-weight:650;width:23px;height:23px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--ink-2)}
.evs{display:flex;flex-direction:column;gap:3px;min-width:0}
.evt{display:flex;align-items:center;gap:6px;width:100%;text-align:left;font-size:11.5px;font-weight:600;color:var(--ink-2);background:var(--soft);border-radius:6px;padding:3px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.evt:hover{background:var(--soft-2)}
.evt.past{opacity:.42}
.ed{width:7px;height:7px;border-radius:2px;flex:0 0 auto}
.evmore{font-size:10.5px;color:var(--muted);font-weight:600;padding-left:3px}
.clocks{display:flex;flex-direction:column;gap:9px}
.clock{display:flex;align-items:center;gap:10px}
.cgrow{flex:1}

function onsiteToday(a){var ms=[],me=[],t=todayISO();

  Object.keys(a.active||{}).forEach(function(m){ms.push(a.active[m]);me.push(Date.now());});

function clockOut(id,m){var a=DB.find(function(x){return x.id===id;});a.active=a.active||{};var st=a.active[m];if(!st)return;
  var mins=Math.max(1,Math.round((Date.now()-st)/60000));a.shifts=a.shifts||[];
  a.shifts.push({worker:m,start:new Date(st).toISOString(),end:new Date().toISOString(),minutes:mins,date:todayISO(),approved:true});
  delete a.active[m];save();renderClocks();toast(m+" clocked out · "+hrs(mins));}

function crewSize(a){return(a.crew&&a.crew.length)||1;}

function parseQuickTask(str){var s=str.trim(),low=s.toLowerCase(),T=todayISO(),due=null,time=null;
  var days={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};

  if(/\btomorrow\b/.test(low)){due=addDays(T,1);s=s.replace(/\btomorrow\b/i,"").trim();}
  else if(/\btoday\b/.test(low)){due=T;s=s.replace(/\btoday\b/i,"").trim();}
  else{var nd=low.match(/\bin\s+(\d+)\s+days?\b/);if(nd){due=addDays(T,+nd[1]);s=s.replace(new RegExp(nd[0],"i"),"").trim();}
   else{var wd=low.match(/\b(on|by|next)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tue|wed|thu|fri|sat)\b/)||low.match(/\b(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tue|wed|thu|fri|sat)\s*$/);

  s=s.replace(/\b(on|by|next|with)\b\s*$/i,"").replace(/\s{2,}/g," ").trim();
  return {title:s||str.trim(),due:due,dueTime:time};}

function quickAddTask(){var inp=document.getElementById("tkQuick");if(!inp)return;var v=inp.value.trim();if(!v)return;var p=parseQuickTask(v);TASKS.unshift({id:uid(),title:p.title,related:null,due:p.due,dueTime:p.dueTime,priority:"med",status:"todo",notes:"",source:"quick",created:todayISO()});saveTasks();renderTasksDrawer();afterTaskChange();}
function quickAddTaskFor(id){var inp=document.getElementById("ctkQuick");if(!inp)return;var v=inp.value.trim();if(!v)return;var p=parseQuickTask(v);var a=DB.find(function(x){return x.id===id;});TASKS.unshift({id:uid(),title:p.title,related:{type:"customer",id:id,label:a.name},due:p.due,dueTime:p.dueTime,priority:"med",status:"todo",notes:"",source:"quick",created:todayISO()});saveTasks();openDetail(id);toast("Task added");}
function toggleTaskDone(id){var t=TASKS.find(function(x){return x.id===id;});if(!t)return;t.status=(t.status==="done")?"todo":"done";saveTasks();afterTaskChange();}
function deleteTask(id){TASKS=TASKS.filter(function(t){return t.id!==id;});saveTasks();closeScrim();afterTaskChange();toast("Task deleted");}
function openTaskEdit(id){openTaskModal(id);}
function openTaskModal(id){var t=id?TASKS.find(function(x){return x.id===id;}):null,isNew=!t;
  var custOpts='<option value="">— none —</option>'+DB.slice().sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(a){return '<option value="'+a.id+'"'+(t&&t.related&&t.related.id===a.id?" selected":"")+'>'+esc(a.name)+'</option>';}).join("");
  var stOpts=[["todo","To do"],["inprogress","In progress"],["waiting","Waiting on customer"],["done","Completed"],["cancelled","Cancelled"]].map(function(o){return '<option value="'+o[0]+'"'+(t&&t.status===o[0]?" selected":"")+'>'+o[1]+'</option>';}).join("");
  var prOpts=[["high","High"],["med","Medium"],["low","Low"]].map(function(o){return '<option value="'+o[0]+'"'+((t?t.priority:"med")===o[0]?" selected":"")+'>'+o[1]+'</option>';}).join("");
  openScrim('<div class="modal"><div class="mh"><h3>'+(isNew?"New task":"Edit task")+'</h3></div><div class="mb">'+
    '<label class="fld">Task<input id="tk_title" value="'+(t?esc(t.title):"")+'" placeholder="e.g. Follow up on quote"></label>'+
    '<label class="fld">Related customer<select id="tk_rel">'+custOpts+'</select></label>'+
    '<div class="two"><label class="fld">Due date<input id="tk_due" type="date" value="'+(t&&t.due?t.due:"")+'"></label><label class="fld">Due time<input id="tk_time" type="time" value="'+(t&&t.dueTime?t.dueTime:"")+'"></label></div>'+
    '<div class="two"><label class="fld">Priority<select id="tk_pri">'+prOpts+'</select></label><label class="fld">Status<select id="tk_st">'+stOpts+'</select></label></div>'+
    '<label class="fld">Notes<input id="tk_notes" value="'+(t?esc(t.notes||""):"")+'"></label>'+
    (isNew?"":'<button class="btn danger sm" onclick="deleteTask(\''+t.id+'\')">Delete task</button>')+
    '</div><div class="mf"><button class="btn ghost" onclick="closeScrim()">Cancel</button><button class="btn primary" id="tkSave">'+(isNew?"Add task":"Save")+'</button></div></div>');
  document.getElementById("tkSave").onclick=function(){var title=document.getElementById("tk_title").value.trim();if(!title){toast("Title required");return;}
    var rid=document.getElementById("tk_rel").value,rel=rid?{type:"customer",id:rid,label:(DB.find(function(x){return x.id===rid;})||{}).name}:null;
    var obj={title:title,related:rel,due:document.getElementById("tk_due").value||null,dueTime:document.getElementById("tk_time").value||null,priority:document.getElementById("tk_pri").value,status:document.getElementById("tk_st").value,notes:document.getElementById("tk_notes").value.trim()};
    if(isNew){TASKS.unshift(Object.assign({id:uid(),source:"manual",created:todayISO()},obj));}else{Object.assign(t,obj);}
    saveTasks();closeScrim();afterTaskChange();toast(isNew?"Task added":"Task saved");};}
function customerTasksHTML(a){var ts=TASKS.filter(function(t){return t.related&&t.related.id===a.id;}).sort(function(x,y){return (x.due||"9")<(y.due||"9")?-1:1;});
  return '<div class="block"><h3>Tasks</h3><div class="tk-quick"><input id="ctkQuick" placeholder="Add a task for this customer…" onkeydown="if(event.key===\'Enter\')quickAddTaskFor(\''+a.id+'\')"><button class="btn sm" onclick="quickAddTaskFor(\''+a.id+'\')">Add</button></div>'+
   (ts.length?'<div class="tklist" style="margin-top:10px">'+ts.map(taskRow).join("")+'</div>':'<div class="empty" style="padding:6px 0;text-align:left">No tasks yet.</div>')+'</div>';}
function todayTasksHTML(){var c=taskCounts();
  var list=TASKS.filter(function(t){return taskOverdue(t)||taskDueToday(t);}).sort(function(a,b){return (a.due||"")<(b.due||"")?-1:1;}).slice(0,6);
  return '<div class="sec"><div class="sec-h"><h2>Today\'s tasks</h2><span class="count">'+c.dueToday+' today · '+c.overdue+' overdue</span><div class="grow"></div><button class="link" onclick="openTasks()">View all</button></div>'+
   '<div class="list">'+(list.length?list.map(function(t){return taskRow(t);}).join(""):'<div class="empty">No tasks due today.</div>')+'</div></div>';}
function updateTaskBadge(){var b=document.getElementById("taskBadge");if(!b)return;var c=taskCounts();if(c.badge>0){b.textContent=c.badge;b.classList.remove("hidden");}else b.classList.add("hidden");}
function afterTaskChange(){updateTaskBadge();if(curView==="dashboard")renderDashboard();var dw=document.getElementById("drawer");if(dw&&!dw.classList.contains("hidden")&&/>Tasks</.test(dw.innerHTML))renderTasksDrawer();if(curView==="detail"&&curAcct)openDetail(curAcct);}
function toggleCreate(e){if(e&&e.stopPropagation)e.stopPropagation();var m=document.getElementById("createMenu");if(m)m.classList.toggle("hidden");}
document.addEventListener("click",function(e){var m=document.getElementById("createMenu");if(m&&!m.classList.contains("hidden")&&!(e.target.closest&&e.target.closest("#createWrap")))m.classList.add("hidden");});
var STAGE2={"new":{l:"New",c:"var(--blue)"},"contacted":{l:"Contacted",c:"var(--accent)"},"qualified":{l:"Qualified",c:"#7c4dbd"},"quote-needed":{l:"Quote needed",c:"var(--amber)"},"quote-sent":{l:"Quote sent",c:"#0d8a7e"},"follow-up":{l:"Follow-up",c:"var(--amber)"},"won":{l:"Won",c:"var(--green)"},"lost":{l:"Lost",c:"var(--muted)"}};
var SOURCES=["phone","email","website","referral","existing customer","manual"];
var STAGE_ORDER=["new","contacted","qualified","quote-needed","quote-sent","follow-up"];
function loadInquiries(){try{var r=localStorage.getItem("pennwash.inquiries");if(r)return JSON.parse(r);}catch(e){}var T=todayISO();
  var seed=[
   {id:uid(),company:"Northeast Transport",contact:"David Miller",phone:"570-555-0420",email:"dmiller@netrans.com",source:"email",location:"Wilkes-Barre, PA",fleetSize:32,service:"Fleet wash",frequency:"Weekly",estValue:2400,stage:"quote-sent",received:addDays(T,-5),lastContacted:addDays(T,-5),nextAction:"Follow up on quote",nextFollowup:T,notes:"Uses an inconsistent local provider. Wants Tue/Thu service. Needs pricing by Friday.",lostReason:"",created:addDays(T,-5)},
   {id:uid(),company:"Keystone Foods",contact:"Amy Cole",phone:"",email:"acole@keystonefoods.com",source:"website",location:"Hazleton, PA",fleetSize:18,service:"Trailer wash",frequency:"Bi-weekly",estValue:1100,stage:"new",received:addDays(T,-1),lastContacted:"",nextAction:"",nextFollowup:"",notes:"Submitted website contact form.",lostReason:"",created:addDays(T,-1)},
   {id:uid(),company:"Valley Produce",contact:"Rob King",phone:"570-555-0488",email:"rking@valleyproduce.com",source:"referral",location:"Scranton, PA",fleetSize:24,service:"Fleet wash",frequency:"Weekly",estValue:1800,stage:"contacted",received:addDays(T,-9),lastContacted:addDays(T,-7),nextAction:"Send pricing",nextFollowup:addDays(T,-2),notes:"Referred by Steelcase.",lostReason:"",created:addDays(T,-9)},
   {id:uid(),company:"Cargo Plus",contact:"Lena Wu",phone:"570-555-0512",email:"lwu@cargoplus.com",source:"phone",location:"Allentown, PA",fleetSize:40,service:"Fleet wash",frequency:"M/W/F",estValue:3200,stage:"qualified",received:addDays(T,-3),lastContacted:addDays(T,-2),nextAction:"Prepare quote",nextFollowup:addDays(T,1),notes:"Large fleet, wants multiple washes per week.",lostReason:"",created:addDays(T,-3)}
  ];try{localStorage.setItem("pennwash.inquiries",JSON.stringify(seed));}catch(e){}return seed;}
var INQUIRIES=loadInquiries();var salesFilter="open";
function saveInquiries(){try{localStorage.setItem("pennwash.inquiries",JSON.stringify(INQUIRIES));}catch(e){}}
function inquiryAge(i){return Math.max(0,daysBetween(i.received||todayISO(),todayISO()));}
function needsFollowup(i){return i.stage!=="won"&&i.stage!=="lost"&&(!i.nextFollowup||i.nextFollowup<todayISO());}
function stageBadge2(st){var x=STAGE2[st]||STAGE2["new"];return '<span class="prio" style="color:'+x.c+';background:var(--soft-2)">'+x.l+'</span>';}
function setSalesFilter(f){salesFilter=f;renderSales();}
function inqCard(i){var fu=needsFollowup(i),age=inquiryAge(i);
  return '<button class="acct inqcard" data-id="'+i.id+'"><div class="top">'+av(i.company)+'<div style="min-width:0;flex:1"><div class="nm">'+esc(i.company)+'</div><div class="loc">'+(i.fleetSize?i.fleetSize+" trucks · ":"")+esc(i.service||"")+'</div></div>'+stageBadge2(i.stage)+'</div>'+
    '<div class="mid"><span class="chip">'+(i.estValue?money(i.estValue)+"/mo":"Value TBD")+'</span>'+(i.frequency?'<span class="chip">'+esc(i.frequency)+'</span>':"")+'<span class="chip">'+age+'d old</span></div>'+
    '<div class="foot"><div class="due">'+(i.nextFollowup?'Follow-up <b style="color:'+(fu?"var(--red)":"var(--ink)")+'">'+fmt(i.nextFollowup)+'</b>':'<span style="color:var(--amber)">No follow-up set</span>')+'</div>'+(i.nextAction?'<span class="status s-soon" style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(i.nextAction)+'</span>':"")+'</div></button>';}
function renderSales(){document.getElementById("pageSub").textContent="Inquiries & opportunity pipeline";
  var open=INQUIRIES.filter(function(i){return i.stage!=="won"&&i.stage!=="lost";});
  var pipe=open.reduce(function(t,i){return t+(i.estValue||0);},0),needFu=open.filter(needsFollowup).length,won=INQUIRIES.filter(function(i){return i.stage==="won";}).length;
  var stat=function(n,l,c){return '<div class="stat"><div class="n"'+(c?' style="color:'+c+'"':'')+'>'+n+'</div><div class="l">'+l+'</div></div>';};
  var html='<div class="strip">'+stat(open.length,"Open inquiries")+stat(money(pipe),"Pipeline value")+stat(needFu,"Need follow-up",needFu?"var(--amber)":null)+stat(won,"Won")+'</div>';
  html+='<div class="filters">'+[["open","Pipeline"],["won","Won"],["lost","Lost"],["all","All"]].map(function(fp){return '<button class="fchip'+(salesFilter===fp[0]?" on":"")+'" onclick="setSalesFilter(\''+fp[0]+'\')">'+fp[1]+'</button>';}).join("")+'<div class="grow"></div><button class="btn sm primary" onclick="openInquiryModal(null)">+ New inquiry</button></div>';
  if(salesFilter==="open"){
    html+=STAGE_ORDER.map(function(st){var items=open.filter(function(i){return i.stage===st;});if(!items.length)return"";return '<div class="sec"><div class="sec-h"><h2>'+STAGE2[st].l+'</h2><span class="count">'+items.length+'</span></div><div class="grid">'+items.map(inqCard).join("")+'</div></div>';}).join("")||'<div class="empty">No open inquiries. Add one with "+ New inquiry".</div>';
  }else{
    var list=INQUIRIES.filter(function(i){if(salesFilter==="won")return i.stage==="won";if(salesFilter==="lost")return i.stage==="lost";return true;});
    html+='<div class="grid">'+(list.length?list.map(inqCard).join(""):'<div class="empty">Nothing here.</div>')+'</div>';
  }
  document.getElementById("salesView").innerHTML=html;
  document.querySelectorAll("#salesView .inqcard").forEach(function(c){c.onclick=function(){openInquiry(c.dataset.id);};});}
function openInquiry(id){var i=INQUIRIES.find(function(x){return x.id===id;});if(!i)return;var tasks=TASKS.filter(function(t){return t.related&&t.related.id===id;});
  document.getElementById("drawer").innerHTML='<div class="dw-h"><div class="dw-t">'+av(i.company)+'<div style="min-width:0"><div class="dw-nm">'+esc(i.company)+'</div><div class="dw-loc">'+stageBadge2(i.stage)+' · '+inquiryAge(i)+'d old · '+esc(i.source||"")+'</div></div></div><button class="dw-x" onclick="closeJob()">&#10005;</button></div>'+
   '<div class="dw-b">'+
   '<div class="dw-facts"><div><span>Contact</span><b>'+(esc(i.contact)||"—")+'</b></div><div><span>Fleet</span><b>'+(i.fleetSize||"—")+' trucks</b></div><div><span>Service</span><b>'+(esc(i.service)||"—")+(i.frequency?" · "+esc(i.frequency):"")+'</b></div><div><span>Est. value</span><b>'+(i.estValue?money(i.estValue)+"/mo":"TBD")+'</b></div></div>'+
   '<div class="dw-sec">What happens next?</div>'+((i.nextAction||i.nextFollowup)?'<div class="minfo"><b>'+(esc(i.nextAction)||"Follow up")+'</b>'+(i.nextFollowup?' · by '+fmt(i.nextFollowup):"")+'</div>':'<div class="dw-warn">⚠ No next action — this lead could go cold</div>')+
   '<div class="dw-sec">Move stage</div><div class="pick">'+["new","contacted","qualified","quote-needed","quote-sent","follow-up","won","lost"].map(function(st){return '<button type="button" class="'+(i.stage===st?"on":"")+'" onclick="setInquiryStage(\''+id+'\',\''+st+'\')">'+STAGE2[st].l+'</button>';}).join("")+'</div>'+
   (i.notes?'<div class="dw-sec">Notes</div><div class="minfo">'+esc(i.notes)+'</div>':"")+
   '<div class="dw-sec">Tasks</div><div class="tk-quick"><input id="iqtkQuick" placeholder="Add a task…" onkeydown="if(event.key===\'Enter\')addInquiryTask(\''+id+'\')"><button class="btn sm" onclick="addInquiryTask(\''+id+'\')">Add</button></div>'+(tasks.length?'<div class="tklist" style="margin-top:8px">'+tasks.map(taskRow).join("")+'</div>':"")+
   '</div><div class="dw-f"><button class="btn" onclick="editInquiry(\''+id+'\')">Edit</button>'+(i.customerId?'<button class="btn primary" onclick="closeJob();openDetail(\''+i.customerId+'\')">Open customer</button>':'<button class="btn primary" onclick="convertInquiry(\''+id+'\')">Convert to customer</button>')+'</div>';
  document.getElementById("drawer").classList.remove("hidden");document.getElementById("drawerScrim").classList.remove("hidden");}
function setInquiryStage(id,st){var i=INQUIRIES.find(function(x){return x.id===id;});i.stage=st;i.lastContacted=todayISO();saveInquiries();openInquiry(id);if(curView==="sales")renderSales();if(curView==="dashboard")renderDashboard();toast("Moved to "+STAGE2[st].l);}
function addInquiryTask(id){var inp=document.getElementById("iqtkQuick");if(!inp)return;var v=inp.value.trim();if(!v)return;var p=parseQuickTask(v);var i=INQUIRIES.find(function(x){return x.id===id;});TASKS.unshift({id:uid(),title:p.title,related:{type:"inquiry",id:id,label:i.company},due:p.due,dueTime:p.dueTime,priority:"med",status:"todo",notes:"",source:"quick",created:todayISO()});saveTasks();updateTaskBadge();openInquiry(id);toast("Task added");}
function convertInquiry(id){var i=INQUIRIES.find(function(x){return x.id===id;});if(i.customerId){toast("Already converted");return;}
  var fm={weekly:7,"bi-weekly":14,biweekly:14,monthly:30},fq=fm[(i.frequency||"").toLowerCase()]||7;
  var na=acct({name:i.company,location:i.location||"",contact:i.contact||"",phone:i.phone||"",email:i.email||"",freq:fq,avgMin:180,lastVisit:todayISO(),trucks:+i.fleetSize||0,tkPrefix:"T-",crew:[],billRate:0,stage:"active"});
  DB.push(na);save();i.stage="won";i.customerId=na.id;i.lastContacted=todayISO();saveInquiries();closeJob();openDetail(na.id);toast(i.company+" converted to a customer");}
function editInquiry(id){openInquiryModal(id);}
function openInquiryModal(id){var i=id?INQUIRIES.find(function(x){return x.id===id;}):null,isNew=!i;
  var srcOpts=SOURCES.map(function(sc){return '<option value="'+sc+'"'+(i&&i.source===sc?" selected":"")+'>'+sc.charAt(0).toUpperCase()+sc.slice(1)+'</option>';}).join("");
  var stOpts=Object.keys(STAGE2).map(function(st){return '<option value="'+st+'"'+((i?i.stage:"new")===st?" selected":"")+'>'+STAGE2[st].l+'</option>';}).join("");
  openScrim('<div class="modal"><div class="mh"><h3>'+(isNew?"New inquiry":"Edit inquiry")+'</h3></div><div class="mb">'+
    '<label class="fld">Company<input id="iq_co" value="'+(i?esc(i.company):"")+'" placeholder="e.g. Northeast Transport"></label>'+
    '<div class="two"><label class="fld">Contact<input id="iq_contact" value="'+(i?esc(i.contact||""):"")+'"></label><label class="fld">Phone<input id="iq_phone" value="'+(i?esc(i.phone||""):"")+'"></label></div>'+
    '<label class="fld">Email<input id="iq_email" value="'+(i?esc(i.email||""):"")+'"></label>'+
    '<div class="two"><label class="fld">Source<select id="iq_src">'+srcOpts+'</select></label><label class="fld">Location<input id="iq_loc" value="'+(i?esc(i.location||""):"")+'"></label></div>'+
    '<div class="two"><label class="fld">Fleet size<input id="iq_fleet" type="number" min="0" value="'+(i?(i.fleetSize||0):0)+'"></label><label class="fld">Est. value ($/mo)<input id="iq_val" type="number" min="0" value="'+(i?(i.estValue||0):0)+'"></label></div>'+
    '<div class="two"><label class="fld">Requested service<input id="iq_service" value="'+(i?esc(i.service||""):"")+'" placeholder="Fleet wash"></label><label class="fld">Frequency<input id="iq_freq" value="'+(i?esc(i.frequency||""):"")+'" placeholder="Weekly, Tue/Thu..."></label></div>'+
    '<div class="two"><label class="fld">Stage<select id="iq_stage">'+stOpts+'</select></label><label class="fld">Date received<input id="iq_recv" type="date" value="'+(i&&i.received?i.received:todayISO())+'"></label></div>'+
    '<div class="two"><label class="fld">Next action<input id="iq_na" value="'+(i?esc(i.nextAction||""):"")+'"></label><label class="fld">Next follow-up<input id="iq_fu" type="date" value="'+(i&&i.nextFollowup?i.nextFollowup:"")+'"></label></div>'+
    '<label class="fld">Notes<input id="iq_notes" value="'+(i?esc(i.notes||""):"")+'"></label>'+
    '<label class="fld">Lost reason (if lost)<input id="iq_lost" value="'+(i?esc(i.lostReason||""):"")+'"></label>'+
    (isNew?"":'<button class="btn danger sm" onclick="deleteInquiry(\''+i.id+'\')">Delete inquiry</button>')+
    '</div><div class="mf"><button class="btn ghost" onclick="closeScrim()">Cancel</button><button class="btn primary" id="iqSave">'+(isNew?"Add inquiry":"Save")+'</button></div></div>');
  document.getElementById("iqSave").onclick=function(){var co=document.getElementById("iq_co").value.trim();if(!co){toast("Company required");return;}
    var obj={company:co,contact:document.getElementById("iq_contact").value.trim(),phone:document.getElementById("iq_phone").value.trim(),email:document.getElementById("iq_email").value.trim(),source:document.getElementById("iq_src").value,location:document.getElementById("iq_loc").value.trim(),fleetSize:+document.getElementById("iq_fleet").value||0,estValue:+document.getElementById("iq_val").value||0,service:document.getElementById("iq_service").value.trim(),frequency:document.getElementById("iq_freq").value.trim(),stage:document.getElementById("iq_stage").value,received:document.getElementById("iq_recv").value||todayISO(),nextAction:document.getElementById("iq_na").value.trim(),nextFollowup:document.getElementById("iq_fu").value||"",notes:document.getElementById("iq_notes").value.trim(),lostReason:document.getElementById("iq_lost").value.trim()};
    if(isNew){INQUIRIES.unshift(Object.assign({id:uid(),lastContacted:"",created:todayISO()},obj));}else{Object.assign(i,obj);}
    saveInquiries();closeScrim();if(curView==="sales")renderSales();else setView("sales");if(curView==="dashboard")renderDashboard();toast(isNew?"Inquiry added":"Inquiry saved");};}
function deleteInquiry(id){INQUIRIES=INQUIRIES.filter(function(x){return x.id!==id;});saveInquiries();closeScrim();closeJob();if(curView==="sales")renderSales();toast("Inquiry deleted");}
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}
function v(id){return document.getElementById(id).value;}
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function exportData(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});const u=URL.createObjectURL(blob),el=document.createElement("a");el.href=u;el.download="penn-mobile-wash-"+todayISO()+".json";el.click();URL.revokeObjectURL(u);toast("Backup downloaded");}
function importData(){const inp=document.createElement("input");inp.type="file";inp.accept="application/json";inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(Array.isArray(d)){DB=d;save();setView("dashboard");applyRole();toast("Backup restored");}else toast("Invalid file");}catch(x){toast("Couldn't read file");}};rd.readAsText(f);};inp.click();}
document.querySelectorAll("#nav button, #tabbar button[data-view]").forEach(b=>b.onclick=()=>setView(b.dataset.view));
updateTaskBadge();
var _am=document.getElementById("addBtnM");if(_am)_am.onclick=()=>openModal(null);
var _eb=document.getElementById("exportBtn");if(_eb)_eb.onclick=exportData;
var _ib=document.getElementById("importBtn");if(_ib)_ib.onclick=importData;
document.getElementById("searchInput").oninput=e=>{searchQ=e.target.value;if(curView!=="accounts"){const q=searchQ;setView("accounts");searchQ=q;document.getElementById("searchInput").value=q;}renderAccounts();};
setView("dashboard");
</script>
